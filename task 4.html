<!DOCTYPE html>
<html>
<head>
    <title>Counter</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-app="" ng-init="count=0">

    <h2>Counter App</h2>

    <button ng-click="count = count + 1">Click Me</button>

    <p>Count: {{count}}</p>

</body>
</html>
