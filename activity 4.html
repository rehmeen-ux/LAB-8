<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>
    
    <!-- AngularJS Library -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-app="" ng-init="students=['Rehmeen','Roshni','Faiza','Damia']">
    <h2>Student List</h2>

    <ul>
        <li ng-repeat="s in students">
            {{s}}
        </li>
    </ul>
</body>
</html>
