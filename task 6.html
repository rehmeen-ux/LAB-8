<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-app="">

    <h2>Login Form</h2>

    <input type="text" ng-model="username" placeholder="Username"><br>
    <input type="password" ng-model="password" placeholder="Password"><br>

    <button ng-click="login = (username=='rehmeen' && password=='7568')">
        Login
    </button>

    <p ng-show="login">✅ Login Successful</p>
    <p ng-show="login === false">❌ Invalid Credentials</p>

</body>
</html>
