<!DOCTYPE html>
<html>
<head>
    <title>ng-init Example</title>
    
    <!-- AngularJS Library -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-app="" ng-init="x=60; y=7">
    <h2>ng-init Example</h2>
    
    <p>X: {{x}}</p>
    <p>Y: {{y}}</p>
    <p>Sum: {{x + y}}</p>
</body>
</html>
