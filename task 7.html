<!DOCTYPE html>
<html>
<head>
    <title>Show/Hide Password</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>

<body ng-app="">

    <h2>Show/Hide Password</h2>

    <input type="{{showPass ? 'text' : 'password'}}" ng-model="password" placeholder="Enter password">

    <br><br>

    <label>
        <input type="checkbox" ng-model="showPass"> Show Password
    </label>

</body>
</html>
